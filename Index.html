<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- UNTUK TAMPILAN HP -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPQ AL-MAIDAH KARANGSONO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    
    input, select, button {
    width: 100% !important;  /* TAMBAH INI */
    padding: 12px;
    margin: 10px 0;
    }
    :root { --bca-primary: #003399; --bca-secondary: #0056b3; --bca-light: #e6f0ff; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%); min-height: 100vh; }
    .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 10px 25px rgba(0, 51, 153, 0.1); }
    .bca-gradient { background: linear-gradient(135deg, #003399 0%, #0055cc 100%); }
    .input-focus:focus { border-color: var(--bca-primary); box-shadow: 0 0 0 4px rgba(0, 51, 153, 0.1); }
    .btn-bounce:active { transform: scale(0.97); }
    .loader-pro { width: 20px; height: 20px; border: 2px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .fade-up { animation: fadeUp 0.6s ease-out forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-enter { animation: modalEnter 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes modalEnter { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="flex flex-col">
  <div style="max-width: 600px; margin: 0 auto; padding: 15px;">
  <div class="bca-gradient pt-12 pb-20 px-6 rounded-b-[3rem] shadow-2xl relative overflow-hidden">
    <div class="absolute -right-10 -top-10 w-40 h-40 bg-white opacity-10 rounded-full"></div>
    <div class="absolute -left-5 bottom-0 w-24 h-24 bg-white opacity-5 rounded-full"></div>
    <div class="relative z-10 text-center">
      <h1 class="text-2xl font-extrabold text-white tracking-[0.2em] uppercase mb-1">AL-MAIDAH</h1>
      <div class="flex items-center justify-center gap-2">
        <span class="h-px w-8 bg-blue-300 opacity-50"></span>
        <p class="text-[10px] text-blue-100 font-semibold tracking-widest uppercase opacity-80"> mencetak generasi berakhlak mulia, cinta Al-Qur'an, dan beriman.</p>
        <span class="h-px w-8 bg-blue-300 opacity-50"></span>
      </div>
    </div>
  </div>
  <main class="flex-grow px-6 -mt-12 relative z-20">
    <div class="glass-card rounded-3xl p-8 max-w-md mx-auto fade-up">
      <div class="flex items-center gap-3 mb-8 border-b border-gray-100 pb-4">
        <div class="p-2 bg-blue-50 rounded-lg">
          <i data-lucide="credit-card" class="w-5 h-5 text-[#003399]"></i>
        </div>
        <div>
          <h2 class="text-gray-800 font-bold">PEMBUKUAN WISUDA, TPQ AL-MAIDAH</h2>
          <p class="text-[10px] text-gray-400">Dusun Krajan, Karangsono, Bangsalsari, Jember</p>
          </div>
          </div>
          <form id="bcaForm" onsubmit="handleSubmit(event)" class="space-y-6">
        
            <div class="space-y-2">
            <label class="text-xs font-bold text-gray-500 ml-1 uppercase tracking-wider">PENGELUARAN UNTUK</label>
            <div class="relative">
            <input type="text" id="nama" placeholder="Keterangan Pengeluaran" class="w-full bg-gray-50 px-4 py-4 rounded-2xl border border-transparent input-focus outline-none transition-all text-gray-700 font-medium placeholder:text-gray-300 uppercase" required>
            </div>
            </div>
        
            <div class="space-y-2">
            <label class="text-xs font-bold text-gray-500 ml-1 uppercase tracking-wider">Harga</label>
            <div class="relative">
            <input type="number" id="noRek" placeholder="Contoh: 100.000" class="w-full bg-gray-50 px-4 py-4 rounded-2xl border border-transparent input-focus outline-none transition-all text-gray-700 font-medium placeholder:text-gray-300" required>
            </div>

            <div class="space-y-2">
            <label class="text-xs font-bold text-gray-500 ml-1 uppercase tracking-wider">Satuan</label>
            <div class="flex gap-3">
            <!-- QTY (Kiri) -->
            <div class="relative w-1/3">
            <input 
            type="number" 
            id="qty" 
            placeholder="Qty" 
            min="1"
            class="w-full bg-gray-50 px-4 py-4 rounded-2xl border border-transparent input-focus outline-none transition-all text-gray-700 font-medium placeholder:text-gray-300"
            required>
            </div>
            <!-- Satuan (Kanan) -->
            <div class="relative w-2/3">
            <select 
            id="harga" 
            class="w-full bg-gray-50 px-4 py-4 rounded-2xl border border-transparent input-focus outline-none transition-all text-gray-700 font-medium appearance-none"
            required >
              <option value="" disabled selected>Pilih Satuan</option>
              <option value="Paket Unit">Paket Unit</option>
              <option value="Kg">Kg</option>
              <option value="Pcs">Pcs</option>
              <option value="Liter">Liter</option>
              <option value="Kresek">Kresek</option>
              <option value="Kaleng">Kaleng</option>
              <option value="Dus">Dus</option>
              <option value="Box">Box</option>
              <option value="Buah">Buah</option>
              <option value="Pack">Pack</option>              
              <option value="custom">Lainnya (Kustom)</option>
              </select>
            </div>
            </div>
            </div>
            
            <div class="space-y-2">
            <label class="text-xs font-bold text-gray-500 ml-1 uppercase tracking-wider">Jenis Pengeluaran</label>
            <div class="relative">
            <select 
            id="jenis" 
            class="w-full bg-gray-50 px-4 py-4 rounded-2xl border border-transparent input-focus outline-none transition-all text-gray-700 font-medium"
            required
            >
            <option value="" disabled selected>Pilih Kategori</option>
            <option value="Muballigh">Muballigh</option>
            <option value="Konsumsi">Konsumsi</option>
            <option value="Sound System">Sound System</option>
            <option value="Terop">Terop</option>
            <option value="Dekorasi">Dekorasi</option>
            <option value="Dokumentasi">Dokumentasi</option>
            <option value="Rokok">Rokok</option>
            <option value="Drumband">Drumband</option>
            <option value="Undangan">Undangan</option>
            <option value="Hadrah">Hadrah</option>
            <option value="Bengsin">Bengsin</option>
            <option value="Air Minum">Air Minum</option>
            <option value="Snack">Snack</option>
            <option value="Kirap">Kirap</option>
            <option value="custom">Lainnya (Kustom)</option>
            </select>
            </div>
            </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full mx-auto bca-gradient text-white font-bold py-5 px-8 rounded-2xl shadow-xl shadow-blue-200 flex items-center justify-center gap-3 transition-all btn-bounce hover:brightness-110">
            <span id="btnText" class="flex items-center gap-2">Simpan Sekarang <i data-lucide="chevron-right" class="w-4 h-4"></i></span>
            <div id="loading" class="hidden flex items-center gap-2"><span class="loader-pro"></span><span>Mengirim...</span></div>
          </button>
          </div>
      </form>
      <div id="statusMsg" class="mt-6 p-4 rounded-2xl text-sm font-medium text-center hidden transition-all"></div>
    </div>
  </main>
  <footer class="p-8 text-center space-y-2">
    <p class="text-[10px] font-bold text-gray-400 tracking-[0.2em] uppercase">@2026 TPQ AL-MAIDAH KARANGSONO</p>
    <div class="flex justify-center gap-4 opacity-30"><i data-lucide="shield-check" class="w-4 h-4"></i><i data-lucide="lock" class="w-4 h-4"></i><i data-lucide="zap" class="w-4 h-4"></i></div>
  </footer>
  <div id="successModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-[2.5rem] p-10 max-w-xs w-full text-center shadow-2xl modal-enter">
      <div class="w-20 h-20 bca-gradient rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-200">
        <i data-lucide="check" class="text-white w-10 h-10 stroke-[3]"></i>
      </div>
      <h3 class="text-xl font-bold text-gray-900 mb-2 leading-tight">Terima kasih</h3>
      <p class="text-gray-500 text-sm leading-relaxed mb-8">Data anda tersimpan dengan aman</p>
      <button onclick="closeModal()" class="w-full py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-2xl transition-all btn-bounce">Tutup</button>
    </div>
  </div>
  <script>
    lucide.createIcons();
    function handleSubmit(e) {
      e.preventDefault();
      const btnSubmit = document.getElementById('btnSubmit');
      const btnText = document.getElementById('btnText');
      const loading = document.getElementById('loading');
      const statusMsg = document.getElementById('statusMsg');
      const payload = { noRek: document.getElementById('noRek').value, nama: document.getElementById('nama').value, harga: document.getElementById('harga').value,qty: document.getElementById('qty').value,jenis: document.getElementById('jenis').value };
      btnSubmit.disabled = true;
      btnText.classList.add('hidden');
      loading.classList.remove('hidden');
      statusMsg.classList.add('hidden');
      google.script.run.withSuccessHandler((res) => {
        btnSubmit.disabled = false;
        btnText.classList.remove('hidden');
        loading.classList.add('hidden');
        if (res.status === 'success') { openModal(); document.getElementById('bcaForm').reset(); if (navigator.vibrate) navigator.vibrate([50, 30, 50]); }
        else { showStatus('Gagal: ' + res.message, 'bg-red-50 text-red-600 border border-red-100'); }
      }).withFailureHandler((err) => {
        btnSubmit.disabled = false;
        btnText.classList.remove('hidden');
        loading.classList.add('hidden');
        showStatus('Error Sistem: ' + err, 'bg-red-50 text-red-600 border border-red-100');
      }).simpanData(payload);
    }
    function showStatus(msg, classes) {
      const statusMsg = document.getElementById('statusMsg');
      statusMsg.innerText = msg;
      statusMsg.className = `mt-6 p-4 rounded-2xl text-sm font-medium text-center fade-up ${classes}`;
      statusMsg.classList.remove('hidden');
    }
    function openModal() {
      const modal = document.getElementById('successModal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }
    function closeModal() {
      const modal = document.getElementById('successModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }
  </script>
  </div>
</body>
</html>
